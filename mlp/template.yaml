AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  MCP Discovery MLP Service — Semantic search engine for MCP tools.
  Lambda handlers in mlp/lambdas/ import from src/ via PYTHONPATH (no file copying).

# =============================================================================
# Parameters — all secrets use NoEcho to prevent console/CLI exposure
# =============================================================================
Parameters:
  QdrantUrl:
    Type: String
    Default: "http://localhost:6333"
    Description: Qdrant Cloud cluster URL

  QdrantApiKey:
    Type: String
    NoEcho: true
    Description: Qdrant Cloud API key

  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API key for text-embedding-3-small

  CohereApiKey:
    Type: String
    NoEcho: true
    Description: Cohere API key for Rerank v3.5

  SupabaseUrl:
    Type: String
    Description: Supabase project URL (e.g., https://xxx.supabase.co)

  SupabaseServiceKey:
    Type: String
    NoEcho: true
    Description: Supabase service role key (server-side only)

  MlpApiKey:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: >
      Static API key for Denial-of-Wallet protection.
      All HTTP requests must include x-api-key header with this value.

  AllowedOrigin:
    Type: String
    Default: "*"
    Description: >
      CORS allowed origin. Set to your Lovable domain in prod
      (e.g., https://your-app.lovable.app). Default '*' for dev.

  StageName:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: API Gateway deployment stage

# =============================================================================
# Globals — shared defaults for all Lambda functions
# =============================================================================
Globals:
  Function:
    Runtime: python3.12
    MemorySize: 512
    Timeout: 15
    Architectures:
      - arm64  # Graviton2 — ~34% cheaper, faster cold starts
    Tracing: Active  # X-Ray distributed tracing
    Environment:
      Variables:
        # KEY DESIGN: Lambda handlers import from src/ directly via PYTHONPATH.
        # CodeUri: ../ packages the entire project root into /var/task/.
        # /var/task/src  → enables `from models import ...`, `from pipeline import ...`
        # /var/task      → enables `from mlp.lambdas.search.handler import ...`
        PYTHONPATH: "/var/task/src:/var/task"
        QDRANT_URL: !Ref QdrantUrl
        QDRANT_API_KEY: !Ref QdrantApiKey
        OPENAI_API_KEY: !Ref OpenAIApiKey
        COHERE_API_KEY: !Ref CohereApiKey
        SUPABASE_URL: !Ref SupabaseUrl
        SUPABASE_SERVICE_KEY: !Ref SupabaseServiceKey

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # API Gateway — HTTP API (lighter, cheaper than REST API)
  # ---------------------------------------------------------------------------
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      Description: MCP Discovery MLP HTTP API
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - x-api-key
      # -----------------------------------------------------------------------
      # Auth — Lambda authorizer for API key validation (I2: Denial-of-Wallet)
      # HttpApi does NOT support native Usage Plans / API Keys.
      # A lightweight Lambda authorizer checks the x-api-key header instead.
      # CORS preflight (OPTIONS) is handled by API Gateway before the
      # authorizer runs, so no Auth:NONE override is needed for OPTIONS.
      # -----------------------------------------------------------------------
      Auth:
        DefaultAuthorizer: ApiKeyAuthorizer
        Authorizers:
          ApiKeyAuthorizer:
            AuthorizerPayloadFormatVersion: "2.0"
            EnableSimpleResponses: true
            FunctionArn: !GetAtt ApiKeyAuthorizerFunction.Arn
            EnableFunctionDefaultPermissions: true
            Identity:
              Headers:
                - x-api-key
              ReauthorizeEvery: 300  # Cache authorizer result for 5 minutes
      # Throttling protects downstream services (Qdrant, Cohere) from burst
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 100

  # ---------------------------------------------------------------------------
  # ApiKeyAuthorizerFunction — validates x-api-key header (I2: Denial-of-Wallet)
  # Tiny footprint: 128 MB, 3s timeout, no external deps. Result cached 300s.
  # ---------------------------------------------------------------------------
  ApiKeyAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mcp-discovery-authorizer-${StageName}"
      Handler: mlp.lambdas.authorizer.handler.lambda_handler
      CodeUri: ../
      Runtime: python3.12
      MemorySize: 128  # Minimal — just string comparison
      Timeout: 3
      Architectures:
        - arm64
      Environment:
        Variables:
          MLP_API_KEY: !Ref MlpApiKey

  # ---------------------------------------------------------------------------
  # SearchFunction — POST /api/search
  # Core 2-stage retrieval: embedding search -> reranker -> confidence branching
  # ---------------------------------------------------------------------------
  SearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mcp-discovery-search-${StageName}"
      Handler: mlp.lambdas.search.handler.lambda_handler
      CodeUri: ../
      Description: Semantic tool search (embedding + rerank + confidence branching)
      Events:
        SearchApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/search
            Method: POST

  # ---------------------------------------------------------------------------
  # RegisterFunction — POST /api/servers
  # Accepts server registration, writes to Supabase, emits EventBridge event
  # ---------------------------------------------------------------------------
  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mcp-discovery-register-${StageName}"
      Handler: mlp.lambdas.register.handler.lambda_handler
      CodeUri: ../
      Description: Register a new MCP server and its tools
      Policies:
        # Allow emitting events to trigger async indexing
        - EventBridgePutEventsPolicy:
            EventBusName: default
      Events:
        RegisterApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/servers
            Method: POST

  # ---------------------------------------------------------------------------
  # IndexFunction — triggered by EventBridge (server.registered)
  # Embeds tool descriptions and upserts to Qdrant. Longer timeout for batch work.
  # ---------------------------------------------------------------------------
  IndexFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mcp-discovery-index-${StageName}"
      Handler: mlp.lambdas.index.handler.lambda_handler
      CodeUri: ../
      Timeout: 60  # Embedding batch + Qdrant upsert can take time
      Description: Async indexing — embed tool descriptions and upsert to Qdrant
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt IndexDLQ.Arn
      Events:
        ServerRegistered:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - "mcp-discovery"
              detail-type:
                - "server.registered"

  # ---------------------------------------------------------------------------
  # ExecuteFunction — POST /api/execute
  # Thin proxy: forwards tool execution to the provider's MCP server.
  # Longer timeout (30s) because downstream MCP execution is unpredictable.
  # ---------------------------------------------------------------------------
  ExecuteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mcp-discovery-execute-${StageName}"
      Handler: mlp.lambdas.execute.handler.lambda_handler
      CodeUri: ../
      Timeout: 30  # Downstream MCP execution latency is variable
      Description: Proxy tool execution to provider MCP servers
      Events:
        ExecuteApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/execute
            Method: POST

  # ---------------------------------------------------------------------------
  # BridgeFunction — POST /mcp, GET /mcp
  # MCP protocol endpoint: LLM clients connect here as a standard MCP server.
  # Exposes find_best_tool and execute_tool via MCP protocol.
  # ---------------------------------------------------------------------------
  BridgeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mcp-discovery-bridge-${StageName}"
      Handler: mlp.lambdas.bridge.handler.lambda_handler
      CodeUri: ../
      Description: Bridge MCP Server — LLM clients connect via MCP protocol
      Events:
        BridgePost:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /mcp
            Method: POST
        BridgeGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /mcp
            Method: GET

  # ---------------------------------------------------------------------------
  # IndexDLQ — Dead Letter Queue for failed indexing events
  # 14-day retention (max) so we can inspect and retry failures
  # ---------------------------------------------------------------------------
  IndexDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "mcp-discovery-index-dlq-${StageName}"
      MessageRetentionPeriod: 1209600  # 14 days (maximum)

  # ---------------------------------------------------------------------------
  # WarmingRule — keeps SearchFunction warm to avoid cold starts
  # Fires every 5 minutes. Handler must detect and short-circuit warming events.
  # ---------------------------------------------------------------------------
  WarmingRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Keep SearchFunction warm (5-min interval)
      ScheduleExpression: "rate(5 minutes)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt SearchFunction.Arn
          Id: SearchFunctionWarming
          Input: '{"source": "warming"}'

  # Permission for EventBridge to invoke SearchFunction (warming)
  WarmingPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SearchFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WarmingRule.Arn

  # ---------------------------------------------------------------------------
  # CloudWatch Alarms — operational observability
  # ---------------------------------------------------------------------------

  # SearchLatencyAlarm: fires when p95 latency exceeds 2 seconds
  SearchLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "mcp-discovery-search-p95-latency-${StageName}"
      AlarmDescription: >
        Search function p95 latency exceeds 2000ms.
        Check Qdrant/Cohere connectivity and cold start frequency.
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref SearchFunction
      ExtendedStatistic: p95
      Period: 300  # 5 minutes
      EvaluationPeriods: 2
      Threshold: 2000  # 2 seconds in ms
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # SearchErrorAlarm: fires when error count exceeds 5 in a 5-minute window
  SearchErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "mcp-discovery-search-errors-${StageName}"
      AlarmDescription: >
        Search function errors exceeded threshold.
        Check logs for Qdrant/Cohere/OpenAI API failures.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SearchFunction
      Statistic: Sum
      Period: 300  # 5 minutes
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

# =============================================================================
# Outputs — values needed by CI/CD, frontend config, and MCP client setup
# =============================================================================
Outputs:
  ApiUrl:
    Description: Base URL for all API endpoints
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"

  SearchFunctionArn:
    Description: ARN of the Search Lambda (for monitoring and IAM references)
    Value: !GetAtt SearchFunction.Arn

  BridgeMcpEndpoint:
    Description: MCP protocol endpoint — point LLM clients here
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/mcp"
